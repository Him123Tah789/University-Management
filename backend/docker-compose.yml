services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports: [ "5432:5432" ]

  redis:
    image: redis:7
    ports: [ "6379:6379" ]

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      WOOCOMMERCE_WEBHOOK_SECRET: change_me
      PYTHONPATH: /var/app
    ports: [ "8000:8000" ]
    depends_on: [ db, redis ]

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker -l INFO
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /var/app
    depends_on: [ db, redis ]

  beat:
    build: .
    command: celery -A app.workers.celery_app.celery_app beat -l INFO
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /var/app
    depends_on: [ db, redis ]
